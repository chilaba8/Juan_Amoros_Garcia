    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {

    <style>
        /* Import Inter Font */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        body {
            background-color: #0B0F19;
            color: #f8fafc;
            overflow-x: hidden;
        }

        /* Ambient Background Glows */
        .bg-glow-1 {
            position: fixed; top: -10%; left: -10%; width: 50vw; height: 50vw;
            background: radial-gradient(circle, rgba(56,189,248,0.08) 0%, rgba(11,15,25,0) 70%);
            z-index: -1; pointer-events: none;
        }
        .bg-glow-2 {
            position: fixed; bottom: -10%; right: -10%; width: 50vw; height: 50vw;
            background: radial-gradient(circle, rgba(168,85,247,0.05) 0%, rgba(11,15,25,0) 70%);
            z-index: -1; pointer-events: none;
        }

        /* Professional Glassmorphism */
        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(56, 189, 248, 0.3);
            transform: translateY(-4px);
            box-shadow: 0 12px 40px -10px rgba(56, 189, 248, 0.15);
        }

        /* Timeline specific */
        .timeline-dot {
            transition: all 0.3s ease;
        }
        .timeline-item:hover .timeline-dot {
            background-color: #38bdf8;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.6);
            transform: scale(1.2);
        }

        /* Fade In Animations */
        .fade-in {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #05070A; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #38bdf8; }

        /* Profile Image Hover */
        .profile-img-container {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.5s ease;
        }
        .profile-img-container::after {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(11,15,25,0.8) 0%, transparent 50%);
        }
        .profile-img-container:hover {
            border-color: #38bdf8;
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.2);
            transform: scale(1.02);
        }
        .profile-img-container img {
            transition: all 0.7s ease;
        }
        .profile-img-container:hover img {
            transform: scale(1.05);
            filter: brightness(1.1);
        }
    </style>
</head>

                            <div className="space-y-12 fade-in delay-200">
                                
                                {/* EDUCATION */}
                                <section>
                                    <h2 className="text-2xl font-bold mb-8 flex items-center gap-3">
                                        <div className="w-8 h-[2px] bg-accent"></div>
                                        {content.education.title}
                                    </h2>
                                    
                                    <div className="space-y-4">
                                        {content.education.items.map((edu, idx) => (
                                            <div key={idx} className="glass-card p-5 rounded-xl group relative overflow-hidden flex items-center gap-4">
                                                <div className="absolute -right-4 -top-4 w-16 h-16 bg-accent/5 rounded-full blur-xl group-hover:bg-accent/20 transition-all"></div>
                                                <div className="flex-1 relative z-10">
                                                    <h3 className="font-semibold text-white group-hover:text-accent transition-colors">{edu.degree}</h3>
                                                    <p className="text-sm text-slate-400 mt-1">{edu.school}</p>
                                                    <p className="text-xs text-accent/60 mt-2 font-mono">{edu.date}</p>
                                                    {edu.desc && <p className="text-sm text-slate-500 mt-3 border-t border-white/5 pt-3">{edu.desc}</p>}
                                                </div>
                                                {edu.image && (
                                                    <div className="w-16 h-20 shrink-0 relative z-10 transform group-hover:scale-110 transition-all duration-500 flex items-center justify-center">
                                                        <CertImage title={edu.degree} />
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                </section>

                                {/* SKILLS */}
                                <section>
                                    <h2 className="text-2xl font-bold mb-8 flex items-center gap-3">
                                        <div className="w-8 h-[2px] bg-accent"></div>
                                        {content.skills.title}
                                    </h2>
                                    
                                    <div className="glass-card p-6 rounded-xl space-y-6">
                                        <div>
                                            <h4 className="text-sm uppercase tracking-widest text-slate-500 mb-3 font-semibold">Soft Skills</h4>
                                            <div className="flex flex-wrap gap-2">
                                                {content.skills.soft.map((skill, i) => (
                                                    <span key={i} className="px-3 py-1.5 text-xs font-medium bg-white/5 text-slate-300 rounded-md border border-white/5 hover:border-accent/50 hover:bg-accent/10 hover:text-white transition-all cursor-default">
                                                        {skill}
                                                    </span>
                                                ))}
                                            </div>
                                        </div>

                                        <div>
                                            <h4 className="text-sm uppercase tracking-widest text-slate-500 mb-3 font-semibold">Hard Skills</h4>
                                            <div className="flex flex-wrap gap-2">
                                                {content.skills.tech.map((skill, i) => (
                                                    <span key={i} className="px-3 py-1.5 text-xs font-medium bg-darker text-slate-300 rounded-md border border-white/10 hover:border-accent hover:text-accent transition-all cursor-default">
                                                        {skill}
                                                    </span>
                                                ))}
                                            </div>
                                        </div>

                                        <div className="pt-4 border-t border-white/10">
                                            <div className="space-y-3">
                                                {content.skills.langs.map((lang, i) => (
                                                    <div key={i} className="flex justify-between items-center group">
                                                        <span className="text-sm text-slate-300 group-hover:text-white transition-colors">{lang.name}</span>
                                                        <span className="text-xs font-mono px-2 py-1 bg-accent/10 text-accent rounded group-hover:bg-accent group-hover:text-dark transition-all">{lang.level}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </section>

                                {/* CONTACTO */}
                                <section>
                                    <h2 className="text-2xl font-bold mb-8 flex items-center gap-3">
                                        <div className="w-8 h-[2px] bg-accent"></div>
                                        {content.contact.title}
                                    </h2>
                                    
                                    <div className="glass-card p-6 rounded-xl space-y-4">
                                        <a href="mailto:amorosgarciaj@gmail.com" className="flex items-center gap-4 p-3 rounded-xl hover:bg-white/5 border border-transparent hover:border-white/10 transition-all group overflow-hidden">
                                            <div className="p-3 bg-accent/10 text-accent rounded-full group-hover:bg-accent group-hover:text-dark transition-colors shrink-0">
                                                <Icons.Mail />
                                            </div>
                                            <div className="flex-1 min-w-0">
                                                <p className="text-xs text-slate-500 uppercase tracking-wider font-semibold mb-1">{content.contact.emailLabel}</p>
                                                <p className="font-medium text-white truncate">amorosgarciaj@gmail.com</p>
                                            </div>
                                            <Icons.ArrowRight />
                                        </a>

                                        <a href="tel:+34653990434" className="flex items-center gap-4 p-3 rounded-xl hover:bg-white/5 border border-transparent hover:border-white/10 transition-all group overflow-hidden">
                                            <div className="p-3 bg-accent/10 text-accent rounded-full group-hover:bg-accent group-hover:text-dark transition-colors shrink-0">
                                                <Icons.Phone />
                                            </div>
                                            <div className="flex-1 min-w-0">
                                                <p className="text-xs text-slate-500 uppercase tracking-wider font-semibold mb-1">{content.contact.phoneLabel}</p>
                                                <p className="font-medium text-white truncate">+34 653 99 04 34</p>
                                            </div>
                                            <Icons.ArrowRight />
                                        </a>
                                    </div>
                                </section>

                            </div>
                        </div>
                    </main>

                    {/* FOOTER */}
                    <footer className="mt-24 border-t border-white/5 pt-8 pb-8 text-center text-slate-500 text-sm">
                        <p>© {new Date().getFullYear()} Juan Amorós García. {lang === 'es' ? 'Todos los derechos reservados.' : lang === 'en' ? 'All rights reserved.' : 'Alle Rechte vorbehalten.'}</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
